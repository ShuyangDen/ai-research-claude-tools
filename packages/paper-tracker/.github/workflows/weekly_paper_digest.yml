name: Weekly AI Paper Digest

on:
  schedule:
    # Run every Monday at 8:00 AM New York Time (EST/EDT)
    # NY time: 8:00 AM = UTC 13:00 (EST) or UTC 12:00 (EDT)
    # Using UTC 13:00 to be safe (works for EST, close for EDT)
    - cron: '0 13 * * 1'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  generate-paper-digest:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies for PDF generation
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libpango-1.0-0 \
          libpangoft2-1.0-0 \
          libharfbuzz0b \
          libffi-dev \
          libjpeg-dev \
          libopenjp2-7-dev \
          libgdk-pixbuf2.0-0 \
          fonts-noto-cjk \
          fonts-noto-cjk-extra \
          fonts-wqy-zenhei \
          fonts-wqy-microhei

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run combined weekly digest (English + Chinese)
      env:
        # Inject secrets from GitHub Secrets
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        echo "Running combined weekly digest..."
        python run_weekly_digest.py

    - name: Upload generated reports (MD and PDF)
      uses: actions/upload-artifact@v4
      with:
        name: paper-reports-${{ github.run_number }}
        path: |
          Econ_JMP_Report_EN_*.md
          Econ_JMP_Report_EN_*.pdf
          Econ_JMP_Report_*.md
          Econ_JMP_Report_*.pdf
        retention-days: 90

    - name: Commit and push reports (optional)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Econ_JMP_Report_*.md Econ_JMP_Report_*.pdf || true
        git commit -m "Add weekly paper digest reports (MD + PDF) - $(date +'%Y-%m-%d')" || true
        git push || true
      continue-on-error: true
