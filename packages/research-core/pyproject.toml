[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "research-workflow-core"
version = "0.1.0"
description = "Deterministic contracts and orchestration primitives for the AI research workflow."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "AI Research Tools"}]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8"]

[project.scripts]
research-core = "research_core.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.data-files]
"share/research-workflow-core/schemas/v1" = ["schemas/v1/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
