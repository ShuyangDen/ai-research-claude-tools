schema_version: 1

defaults:
  fast_moving_refresh_days: 90
  stable_refresh_days: 180
  general_journal_backfill_months: 24
  field_journal_backfill_months: 60

notes:
  - "Level 1 registry only: source identity, manual route, field tags, and cadence."
  - "Human-approved Search Protocol decides which field sources are active for a specific idea."
  - "Do not treat journal prestige as relevance. Record zero-result and unavailable routes in the gate Search Log."

sources:
